name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          QUOTES_API_KEY: ${{ secrets.QUOTES_API_KEY }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          REDIS_CONNECTION_URL: ${{secrets.REDIS_CONNECTION_URL}}
          KAFKA_API_KEY: ${{secrets.KAFKA_API_KEY}}
          KAFKA_API_SECRET: ${{secrets.KAFKA_API_SECRET}}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=adityamathur456_journalapp